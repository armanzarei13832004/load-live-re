<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محاسبه بار زنده کاهش‌یافته</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --card:rgba(255,255,255,.08);
      --txt:#e2e8f0;
      --muted:#94a3b8;
      --primary:#3b82f6;
      --primary-2:#2563eb;
      --success:#22c55e;
      --danger:#ef4444;
      --ring: rgba(59,130,246,.45);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Vazirmatn", "Tahoma", sans-serif;
      color:var(--txt);
      min-height:100vh;
      background:
        radial-gradient(1200px 600px at 10% 10%, #1d4ed8 0%, transparent 50%),
        radial-gradient(1000px 500px at 90% 90%, #0ea5e9 0%, transparent 45%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:min(900px, 100%);
      background:var(--card);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      border-radius:24px;
      padding:24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      animation: fadeIn .8s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(18px)}
      to{opacity:1; transform:translateY(0)}
    }

    h1{
      margin:0 0 8px;
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 800;
      letter-spacing:.3px;
    }
    .sub{
      margin:0 0 18px;
      color:var(--muted);
      font-size:14px;
    }

    .mode{
      display:flex;
      gap:12px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .chip{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.25);
      border-radius:14px;
      padding:10px 14px;
      cursor:pointer;
      user-select:none;
      transition:.25s ease;
      display:flex;
      align-items:center;
      gap:8px;
      background:rgba(255,255,255,.04);
    }
    .chip input{display:none}
    .chip:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.45);
      box-shadow:0 8px 22px rgba(0,0,0,.25);
    }
    .chip.active{
      background:linear-gradient(135deg, rgba(59,130,246,.35), rgba(14,165,233,.25));
      border-color:rgba(125,211,252,.65);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    @media(max-width:700px){
      .grid{grid-template-columns:1fr}
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    label{
      font-size:13px;
      color:#cbd5e1;
    }
    input, select{
      width:100%;
      border:1px solid rgba(255,255,255,.2);
      background:rgba(15,23,42,.45);
      color:var(--txt);
      border-radius:12px;
      padding:12px 12px;
      outline:none;
      transition:.22s ease;
      font-size:14px;
    }
    input:focus, select:focus{
      border-color:#60a5fa;
      box-shadow: 0 0 0 4px var(--ring);
    }

    .hidden{display:none !important}

    .actions{
      margin-top:18px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      position:relative;
      overflow:hidden;
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-size:14px;
      font-weight:700;
      color:white;
      cursor:pointer;
      transition:.28s ease;
      transform:translateY(0);
    }
    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent 20%, rgba(255,255,255,.28), transparent 80%);
      transform:translateX(-120%);
      transition:transform .65s ease;
    }
    .btn:hover::after{transform:translateX(120%)}
    .btn:hover{transform:translateY(-2px); filter:brightness(1.05)}
    .btn:active{transform:translateY(0)}

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      box-shadow:0 10px 24px rgba(37,99,235,.45);
    }
    .btn-ghost{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.2);
      color:#dbeafe;
    }

    .result{
      margin-top:16px;
      background:rgba(2,6,23,.55);
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;
      padding:14px;
      min-height:54px;
      line-height:1.8;
      transition:.25s ease;
    }
    .ok{border-color:rgba(34,197,94,.5); color:#bbf7d0}
    .err{border-color:rgba(239,68,68,.5); color:#fecaca}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>محاسبه بار زنده کاهش‌یافته</h1>
    <p class="sub">حالت محاسبه را انتخاب کنید: <b>بام</b> یا <b>طبقات</b></p>

    <section class="mode">
      <label class="chip active" id="chipRoof">
        <input type="radio" name="mode" value="roof" checked />
        🏠 بام
      </label>
      <label class="chip" id="chipFloor">
        <input type="radio" name="mode" value="floor" />
        🏢 طبقات
      </label>
    </section>

    <section class="grid">
      <div class="field">
        <label for="L0">L0</label>
        <input id="L0" type="number" step="any" placeholder="مثلاً 1.2" />
      </div>

      <div class="field">
        <label for="AT">At</label>
        <input id="AT" type="number" step="any" placeholder="مثلاً 24" />
      </div>

      <div class="field" id="roofSlopeField">
        <label for="S">شیب بام (درجه)</label>
        <input id="S" type="number" step="any" placeholder="مثلاً 20" />
      </div>

      <div class="field hidden" id="floorKllField">
        <label for="KLL">KLL (نمونه برای طبقات)</label>
        <input id="KLL" type="number" step="any" placeholder="مثلاً 4" />
      </div>
    </section>

    <div class="actions">
      <button class="btn btn-primary" id="calcBtn">محاسبه</button>
      <button class="btn btn-ghost" id="resetBtn">پاک کردن</button>
    </div>

    <div id="result" class="result muted">نتیجه اینجا نمایش داده می‌شود.</div>
  </main>

  <script>
    const chipRoof = document.getElementById("chipRoof");
    const chipFloor = document.getElementById("chipFloor");
    const roofSlopeField = document.getElementById("roofSlopeField");
    const floorKllField = document.getElementById("floorKllField");

    const L0El = document.getElementById("L0");
    const ATEl = document.getElementById("AT");
    const SEl = document.getElementById("S");
    const KLLEl = document.getElementById("KLL");

    const resultEl = document.getElementById("result");
    const calcBtn = document.getElementById("calcBtn");
    const resetBtn = document.getElementById("resetBtn");

    let mode = "roof"; // roof | floor

    function setMode(newMode){
      mode = newMode;
      chipRoof.classList.toggle("active", mode === "roof");
      chipFloor.classList.toggle("active", mode === "floor");

      roofSlopeField.classList.toggle("hidden", mode !== "roof");
      floorKllField.classList.toggle("hidden", mode !== "floor");

      resultEl.className = "result muted";
      resultEl.textContent = "نتیجه اینجا نمایش داده می‌شود.";
    }

    chipRoof.addEventListener("click", () => setMode("roof"));
    chipFloor.addEventListener("click", () => setMode("floor"));

    function showError(msg){
      resultEl.className = "result err";
      resultEl.textContent = "❌ " + msg;
    }
    function showOk(msg){
      resultEl.className = "result ok";
      resultEl.textContent = "✅ " + msg;
    }

    calcBtn.addEventListener("click", () => {
      const L0 = parseFloat(L0El.value);
      const AT = parseFloat(ATEl.value);

      if (Number.isNaN(L0) || Number.isNaN(AT)){
        showError("لطفاً L0 و At را به صورت عددی وارد کنید.");
        return;
      }

      if (mode === "roof"){
        const S = parseFloat(SEl.value);
        if (Number.isNaN(S)){
          showError("لطفاً شیب بام را وارد کنید.");
          return;
        }

        if (!(L0 >= 0.6 && L0 <= 1.5)){
          showError("برای بام، L0 باید بین 0.6 تا 1.5 باشد.");
          return;
        }

        let R2;
        if (S <= 33){
          R2 = 1;
        } else if (S > 33 && S < 100){
          R2 = 1.2 - 0.006 * S;
        } else {
          R2 = 0.6;
        }

        let R1;
        if (AT <= 18){
          R1 = 1;
        } else if (AT > 18 && AT <= 54){
          R1 = 0.8;
        } else {
          R1 = 0.6;
        }

        const L = L0 * R1 * R2;
        showOk(`بار زنده کاهش‌یافته بام: L = ${L.toFixed(4)}   (R1=${R1.toFixed(3)}, R2=${R2.toFixed(3)})`);
      } else {
        // حالت طبقات (نمونه) - این قسمت را با کد واقعی قبلی‌ات جایگزین کن
        const KLL = parseFloat(KLLEl.value);
        if (Number.isNaN(KLL)){
          showError("برای حالت طبقات، مقدار KLL را وارد کنید.");
          return;
        }

        // فرمول نمونه:
        // L = L0 * (0.25 + 15 / sqrt(KLL*AT))  (صرفاً نمایشی)
        const factor = 0.25 + 15 / Math.sqrt(KLL * AT);
        const L = L0 * Math.min(1, factor);

        showOk(`بار زنده کاهش‌یافته طبقات (نمونه): L = ${L.toFixed(4)}  |  ضریب=${Math.min(1, factor).toFixed(4)}`);
      }
    });

    resetBtn.addEventListener("click", () => {
      L0El.value = "";
      ATEl.value = "";
      SEl.value = "";
      KLLEl.value = "";
      resultEl.className = "result muted";
      resultEl.textContent = "نتیجه اینجا نمایش داده می‌شود.";
    });
  </script>
</body>
</html>
